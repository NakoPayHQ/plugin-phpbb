<!-- NakoPay checkout template -->
<!-- @package nakopay/phpbb-extension -->

<!-- INCLUDE overall_header.html -->

<h2>{L_NAKOPAY_CHECKOUT_TITLE}</h2>

<div id="nakopay-checkout" class="panel" style="max-width: 420px; margin: 20px auto; text-align: center;">
    <div class="inner">
        <p>{L_NAKOPAY_SCAN_QR}</p>

        <div id="nakopay-qr" style="margin: 15px auto;">
            <canvas id="nakopay-qr-canvas" width="200" height="200"></canvas>
        </div>

        <table class="table1" style="margin: 0 auto;">
            <tr>
                <td><strong>{L_NAKOPAY_ADDRESS}:</strong></td>
                <td>
                    <code id="nakopay-address" style="word-break: break-all;">{NAKOPAY_ADDRESS}</code>
                    <button type="button" onclick="navigator.clipboard.writeText(document.getElementById('nakopay-address').textContent)" class="button2" style="margin-left: 5px;">{L_NAKOPAY_COPIED}</button>
                </td>
            </tr>
            <tr>
                <td><strong>{L_NAKOPAY_AMOUNT}:</strong></td>
                <td><code id="nakopay-amount">{NAKOPAY_AMOUNT_CRYPTO}</code> {NAKOPAY_COIN} (~{NAKOPAY_AMOUNT_FIAT} {NAKOPAY_CURRENCY})</td>
            </tr>
            <tr>
                <td><strong>{L_NAKOPAY_STATUS}:</strong></td>
                <td id="nakopay-status">{L_NAKOPAY_STATUS_PENDING}</td>
            </tr>
        </table>

        <!-- IF NAKOPAY_BIP21 -->
        <p style="margin-top: 15px;">
            <a href="{NAKOPAY_BIP21}" class="button1">{L_NAKOPAY_PAY_WITH_BITCOIN}</a>
        </p>
        <!-- ENDIF -->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<script>
(function() {
    var bip21 = '{NAKOPAY_BIP21}';
    var addr  = '{NAKOPAY_ADDRESS}';
    if (bip21 || addr) {
        new QRious({ element: document.getElementById('nakopay-qr-canvas'), value: bip21 || addr, size: 200, level: 'M' });
    }

    var pollUrl = '{NAKOPAY_POLL_URL}';
    if (!pollUrl) return;
    var interval = setInterval(function() {
        fetch(pollUrl).then(function(r) { return r.json(); }).then(function(d) {
            var el = document.getElementById('nakopay-status');
            if (d.status === 'paid' || d.status === 'completed') {
                el.innerHTML = '<span style="color:green;font-weight:bold;">{L_NAKOPAY_STATUS_PAID}</span>';
                clearInterval(interval);
                if (d.redirect) setTimeout(function() { window.location.href = d.redirect; }, 3000);
            } else if (d.status === 'expired') {
                el.innerHTML = '<span style="color:red;">{L_NAKOPAY_STATUS_EXPIRED}</span>';
                clearInterval(interval);
            }
        }).catch(function() {});
    }, 5000);
})();
</script>

<!-- INCLUDE overall_footer.html -->
