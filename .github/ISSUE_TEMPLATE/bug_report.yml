name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "0.1.0"
    validations: { required: true }
  - type: input
    id: platform-version
    attributes:
      label: phpBB version
      placeholder: "phpBB 3.3.13"
    validations: { required: true }
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "PHP 8.2"
  - type: dropdown
    id: api-mode
    attributes:
      label: API key mode
      options: ["sk_test_*", "sk_live_*", "Not configured yet"]
    validations: { required: true }
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install extension...
        2. Configure...
        3. Click...
    validations: { required: true }
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations: { required: true }
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant error logs (scrub any secrets first).
      render: shell
